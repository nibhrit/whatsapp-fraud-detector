services:
  - type: web
    name: whatsapp-fraud-detector-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # set manually in Render dashboard — never commit the value
